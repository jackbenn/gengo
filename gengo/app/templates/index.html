<html>
<head>
    <title>Gengo</title>
    <meta charset="utf-8"/>
    <script src="/gengo/static/brython/brython.js"></script>
    <script src="/gengo/static/brython/brython_stdlib.js"></script>
    <link href="/gengo/static/css/default.css" rel="stylesheet" type="text/css"/>
</head>
<body onload="brython(1)">
    <script src="/gengo/static/js/list_games.py" type="text/python"></script>

    <div class="header-image-container">
        <img src="/gengo/static/img/sample_game.png" alt="A game of Gengo in progress"/>
    </div>

    <div class="page-container">
        <div class="site-header">
            <h1>Gengo</h1>
        </div>
        <p>
            Gengo (generalized go) is a variant of go played on a finer-grained grid.
            The goal is to claim more of the board than your opponent by surrounding and capturing their stones.
            See the <a href="https://github.com/jackbenn/gengo/blob/master/Rules.md">rules</a>
            for more information.
        </p>

        <div class="two-column">
            <section class="card">
                <h2>Start a New Game</h2>
                <form action="/gengo/game" method="get">
                    <div class="form-grid">
                        <label for="game_name" title="A unique name for your game. Share this with your opponent so they can find and join it.">Game name:</label>
                        <input type="text" id="game_name" name="game_name" title="A unique name for your game. Share this with your opponent so they can find and join it."/>

                        <label for="board_size" title="The number of spaces along each side of the board.">Board size:</label>
                        <input type="text" id="board_size" value="19" maxlength="3" name="board_size" title="The number of spaces along each side of the board."/>

                        <label for="allow_suicide" title="If checked, you may play a stone that immediately has no liberties, capturing your own group.">Allow suicide:</label>
                        <input type="checkbox" id="allow_suicide" checked name="allow_suicide" title="If checked, you may play a stone that immediately has no liberties, capturing your own group."/>

                        <label for="play_in_own_overlap" title="If checked, you may place a stone within the overlap region of your own existing stones.">Play in own overlap:</label>
                        <input type="checkbox" id="play_in_own_overlap" name="play_in_own_overlap" title="If checked, you may place a stone within the overlap region of your own existing stones."/>

                        <label for="play_black" title="If checked, you play as black (the first player). Uncheck to play as white.">Play black:</label>
                        <input type="checkbox" id="play_black" checked name="play_black" title="If checked, you play as black (the first player). Uncheck to play as white."/>

                        <label for="handicap" title="Give black a head start: black places this many stones before white's first move. Must be 2 or more to take effect.">Handicap:</label>
                        <input type="text" id="handicap" maxlength="2" name="handicap" title="Give black a head start: black places this many stones before white's first move. Must be 2 or more to take effect."/>

                        <label for="overlap" title="Determines how large each stone's overlap and neighbor regions are. Larger regions change the game dynamics significantly.">Overlap:</label>
                        <select id="overlap" name="overlap" title="Determines how large each stone's overlap and neighbor regions are. Larger regions change the game dynamics significantly.">
                            <option value="standard">Standard Gengo (10,11;20,21)</option>
                            <option value="go">Standard Go (;10)</option>
                            <option value="large-n">Large Neighbor Region (10,11;20,21,22,30,31)</option>
                            <option value="large-o">Large Overlap (10,11,20,21;22,30,31,32)</option>
                        </select>

                        <label for="show_scores" title="If checked, area and stone scores are updated after every move, not just at the end of the game.">Show scores during game:</label>
                        <input type="checkbox" id="show_scores" name="show_scores" title="If checked, area and stone scores are updated after every move, not just at the end of the game."/>
                    </div>
                    <input type="hidden" name="action" value="new"/>
                    <div class="form-footer">
                        <input type="submit" value="Start Game"/>
                    </div>
                </form>
            </section>

            <section class="card">
                <h2>Join a Game</h2>
                <ul id="games">Loading&hellip;</ul>
            </section>
        </div>
    </div>
</body>
</html>
